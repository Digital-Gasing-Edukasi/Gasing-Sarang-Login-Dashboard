# ─────────────────────────────────────────────────────────────────────────────
# Nginx config — Gasing Circle Auth App (React SPA, base '/register')
# Target: sarang.gasingacademy.org
#
# PENTING: app di-build dengan `base: '/register'` (lihat vite.config.js), jadi
# index.html me-request asset di /register/assets/... . Server HARUS men-serve
# folder build di bawah path /register.
#
# JANGAN pakai `alias` + `try_files` bareng — itu bug lama Nginx (trac #97):
# $uri masih membawa prefix /register sehingga Nginx nyari
#   /var/www/gasing-auth/register/assets/...   (register kedobel → 404 / MIME block)
# Solusi: pakai `root` + taruh file di subfolder register/.
#
# Struktur file di server yang diharapkan:
#   /var/www/gasing-auth/register/index.html
#   /var/www/gasing-auth/register/assets/...
#
# Setup sekali:
#   sudo mkdir -p /var/www/gasing-auth/register
#   sudo mv /var/www/gasing-auth/index.html /var/www/gasing-auth/assets \
#           /var/www/gasing-auth/register/
#   sudo chown -R www-data:www-data /var/www/gasing-auth
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP (port 80) → redirect ke HTTPS ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name sarang.gasingacademy.org;

    # Kalau BELUM pasang TLS/certbot, hapus block redirect di bawah dan
    # pakai block "server 443" isinya di sini (ganti `listen 80`).
    return 301 https://$host$request_uri;
}

# ── HTTPS (port 443) — block utama ───────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sarang.gasingacademy.org;

    # Sertifikat — sesuaikan kalau certbot menaruh di path lain.
    ssl_certificate     /etc/letsencrypt/live/sarang.gasingacademy.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sarang.gasingacademy.org/privkey.pem;

    # File build ada di /var/www/gasing-auth/register/...
    root /var/www/gasing-auth;

    # Root → arahkan ke app.
    location = / {
        return 301 /register/;
    }

    # React SPA di bawah /register. Dengan `root`, /register/assets/x.css
    # map ke /var/www/gasing-auth/register/assets/x.css (benar), dan try_files
    # jatuh ke index.html untuk client-side routing (deep link / refresh).
    location /register/ {
        try_files $uri $uri/ /register/index.html;
    }

    # Asset ber-hash aman di-cache lama (nama file berubah tiap build).
    location /register/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Diamkan 404 favicon (index.html tidak punya <link rel=icon>).
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}
