# ─────────────────────────────────────────────────────────────────────────────
# Nginx config — Sarang Gasing Auth App (React SPA, react-router, base '/')
# Target: sarang.gasingacademy.org
#
# App di-build dengan `base: '/'` (lihat vite.config.js) dan memakai react-router
# (BrowserRouter). Semua route ditangani client-side, jadi server HARUS
# mengembalikan index.html untuk path apa pun yang bukan file nyata — supaya deep
# link & refresh di /login/reset-password, /dashboard-admin, dst tetap jalan.
#
# Route publik (sumber: src/lib/routes.js):
#   /login  /login/forgot-password  /login/check-email  /login/reset-password
#   /login/subscription  /login/subscription/transfer  /login/choice
#   /register  /register/otp  /register/review  /register/revise
#   /register/id/TOS  /register/id/privacy
#   /dashboard-admin
#   /payment/success  /payment/finish  /payment/unfinish  /payment/error
#
# Struktur file di server yang diharapkan:
#   /var/www/gasing-auth/index.html
#   /var/www/gasing-auth/assets/...
#
# MIGRASI dari base '/register' (versi lama, file ada di subfolder register/):
#   sudo mv /var/www/gasing-auth/register/index.html \
#           /var/www/gasing-auth/register/assets /var/www/gasing-auth/
#   sudo rm -rf /var/www/gasing-auth/register
#   sudo chown -R www-data:www-data /var/www/gasing-auth
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP (port 80) → redirect ke HTTPS ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name sarang.gasingacademy.org;

    # Kalau BELUM pasang TLS/certbot, hapus block redirect di bawah dan
    # pakai block "server 443" isinya di sini (ganti `listen 80`).
    return 301 https://$host$request_uri;
}

# ── HTTPS (port 443) — block utama ───────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sarang.gasingacademy.org;

    # Sertifikat — sesuaikan kalau certbot menaruh di path lain.
    ssl_certificate     /etc/letsencrypt/live/sarang.gasingacademy.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sarang.gasingacademy.org/privkey.pem;

    # File build ada langsung di root ini (index.html + assets/).
    root /var/www/gasing-auth;
    index index.html;

    # Root → halaman login. (App juga meredirect / → /login client-side; redirect
    # di server menghemat satu render.)
    location = / {
        return 301 /login;
    }

    # Asset ber-hash aman di-cache lama (nama file berubah tiap build).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: path apa pun yang bukan file nyata → index.html, biar
    # react-router yang menentukan halaman (deep link & refresh tetap jalan).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Diamkan 404 favicon.
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}
